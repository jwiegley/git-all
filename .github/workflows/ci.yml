name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run all checks (build, lint, format, tests)
        run: |
          nix build --accept-flake-config --no-link \
            .#checks.x86_64-linux.build \
            .#checks.x86_64-linux.hlint \
            .#checks.x86_64-linux.fourmolu \
            '.#checks.x86_64-linux."git-all:test:git-all-test"'
